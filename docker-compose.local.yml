version: "3.8"

# ──────────────────────────────────────────────────────────────
# COMPOSE LOCAL — build depuis les Dockerfiles
# Usage : docker compose -f docker-compose.local.yml up --build
# ──────────────────────────────────────────────────────────────

volumes:
  backend_uploads:
  backend_logs:

networks:
  whatsapp-net:
    driver: bridge

services:

  # ────────────────────────────────
  # BACKEND — NestJS (port 3002)
  # ────────────────────────────────
  backend:
    build:
      context: ./message_whatsapp
    image: whatsapp-back:local
    container_name: whatsapp-back
    restart: unless-stopped
    env_file: ./message_whatsapp/.env
    environment:
      # Remplace localhost par host.docker.internal pour atteindre
      # le MySQL installé sur la machine host
      MYSQL_HOST: host.docker.internal
    ports:
      - "3002:3002"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - whatsapp-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ────────────────────────────────
  # FRONTEND — Next.js agents (port 3000)
  # ────────────────────────────────
  frontend:
    build:
      context: ./front
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3002
    image: whatsapp-front:local
    container_name: whatsapp-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - whatsapp-net
    depends_on:
      backend:
        condition: service_healthy

  # ────────────────────────────────
  # ADMIN — Next.js panel (port 3001)
  # ────────────────────────────────
  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
    image: whatsapp-admin:local
    container_name: whatsapp-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - whatsapp-net
    depends_on:
      backend:
        condition: service_healthy

  # ────────────────────────────────
  # PHPMYADMIN — Interface DB (port 8000)
  # ────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: whatsapp-phpmyadmin
    restart: unless-stopped
    ports:
      - "8000:80"
    environment:
      PMA_HOST: host.docker.internal
      PMA_PORT: 3306
      PMA_ARBITRARY: 0
      UPLOAD_LIMIT: 50M
    networks:
      - whatsapp-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
