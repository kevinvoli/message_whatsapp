version: "3.8"

# ──────────────────────────────────────────────────────────────
# COMPOSE LOCAL — build depuis les Dockerfiles
# Usage : docker compose -f docker-compose.local.yml up --build
# ──────────────────────────────────────────────────────────────

volumes:
  backend_uploads:
  backend_logs:

networks:
  whatsapp-net:
    driver: bridge

services:

  # ────────────────────────────────
  # BACKEND — NestJS (port 3002)
  # ────────────────────────────────
  backend:
    build:
      context: ./message_whatsapp
    image: whatsapp-back:local
    container_name: whatsapp-back
    restart: unless-stopped
    env_file: ./message_whatsapp/.env
    environment:
      MYSQL_HOST: host.docker.internal
      WS_PORT: 3005
    ports:
      - "3002:3002"
      - "3005:3005"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - whatsapp-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/',r=>process.exit(r.statusCode>=500?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────
  # FRONTEND — Next.js agents (port 3000)
  # ────────────────────────────────
  frontend:
    build:
      context: ./front
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
        NEXT_PUBLIC_SOCKET_URL: http://localhost:3005
    image: whatsapp-front:local
    container_name: whatsapp-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - whatsapp-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode>=500?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────
  # ADMIN — Next.js panel (port 3001)
  # ────────────────────────────────
  admin:
    build:
      context: ./admin
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3002
    image: whatsapp-admin:local
    container_name: whatsapp-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - whatsapp-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode>=500?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
