name: CI/CD — Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────────
  # 1. DÉTECTION DES CHANGEMENTS
  # ──────────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin:    ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'message_whatsapp/**'
            frontend:
              - 'front/**'
            admin:
              - 'admin/**'

  # ──────────────────────────────────────────────
  # 2a. BUILD BACKEND
  # ──────────────────────────────────────────────
  build-backend:
    name: Build — Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # Driver docker-container obligatoire : évite "unknown blob" lors du push
      # multi-tags vers ghcr.io (le driver docker par défaut a ce bug avec buildx v5+)
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./message_whatsapp
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/back:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/back:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 2b. BUILD FRONTEND
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          provenance: false
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/front:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/front:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 2c. BUILD ADMIN
  # ──────────────────────────────────────────────
  build-admin:
    name: Build — Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          provenance: false
          cache-from: type=gha,scope=admin
          cache-to:   type=gha,scope=admin,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/admin:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/admin:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 3. DÉPLOIEMENT SUR LE SERVEUR
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: [build-backend, build-frontend, build-admin]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          source:   docker-compose.yml
          target:   /var/www/whatsapp/

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /var/www/whatsapp

            # ── Sauvegarde des images actuelles pour rollback ──────────────────
            echo "=== SAUVEGARDE DES IMAGES ACTUELLES ==="
            docker tag ghcr.io/${{ github.repository }}/back:latest  ghcr.io/${{ github.repository }}/back:previous  2>/dev/null || true
            docker tag ghcr.io/${{ github.repository }}/front:latest ghcr.io/${{ github.repository }}/front:previous 2>/dev/null || true
            docker tag ghcr.io/${{ github.repository }}/admin:latest ghcr.io/${{ github.repository }}/admin:previous 2>/dev/null || true

            # ── Pull les nouvelles images ──────────────────────────────────────
            docker compose pull

            # ── Migrations AVANT de démarrer les containers ───────────────────
            docker run --rm \
              --env-file ./message_whatsapp/.env \
              --add-host host.docker.internal:host-gateway \
              ghcr.io/${{ github.repository }}/back:latest \
              npm run migration:run:prod

            # ── Redémarre les containers ───────────────────────────────────────
            docker compose up -d --remove-orphans && {
              echo "=== DÉPLOIEMENT RÉUSSI ==="
              docker image prune -f
            } || {
              echo ""
              echo "=== DÉPLOIEMENT ÉCHOUÉ — LOGS BACKEND ==="
              docker logs whatsapp-back --tail=150 2>&1 || true

              echo ""
              echo "=== ROLLBACK VERS LA VERSION PRÉCÉDENTE ==="
              docker tag ghcr.io/${{ github.repository }}/back:previous  ghcr.io/${{ github.repository }}/back:latest  2>/dev/null || true
              docker tag ghcr.io/${{ github.repository }}/front:previous ghcr.io/${{ github.repository }}/front:latest 2>/dev/null || true
              docker tag ghcr.io/${{ github.repository }}/admin:previous ghcr.io/${{ github.repository }}/admin:latest 2>/dev/null || true

              docker compose up -d --remove-orphans || true
              echo "=== ROLLBACK TERMINÉ — ANCIENNE VERSION RESTAURÉE ==="
              exit 1
            }
