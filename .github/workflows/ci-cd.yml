name: CI/CD — Build & Deploy

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io

jobs:

  # ──────────────────────────────────────────────
  # 1. DÉTECTION DES CHANGEMENTS
  # ──────────────────────────────────────────────
  changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin:    ${{ steps.filter.outputs.admin }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'message_whatsapp/**'
            frontend:
              - 'front/**'
            admin:
              - 'admin/**'

  # ──────────────────────────────────────────────
  # 2a. BUILD BACKEND
  # ──────────────────────────────────────────────
  build-backend:
    name: Build — Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./message_whatsapp
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/back:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/back:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 2b. BUILD FRONTEND
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build — Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/front:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/front:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 2c. BUILD ADMIN
  # ──────────────────────────────────────────────
  build-admin:
    name: Build — Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push admin image
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/admin:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ github.event.repository.name }}/admin:${{ github.sha }}

  # ──────────────────────────────────────────────
  # 3. DÉPLOIEMENT SUR LE SERVEUR
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to server
    needs: [build-backend, build-frontend, build-admin]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key:      ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/whatsapp

            # Authentification au registre GitHub pour puller les images privées
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin

            # Pull les nouvelles images
            docker compose pull

            # Lancer les migrations AVANT de démarrer les containers
            # github.repository est toujours en minuscules (compatible GHCR)
            docker run --rm \
              --env-file ./message_whatsapp/.env \
              --add-host host.docker.internal:host-gateway \
              ghcr.io/${{ github.repository }}/back:latest \
              npm run migration:run:prod

            # Redémarre les containers (DB déjà à jour)
            docker compose up -d --remove-orphans

            # Nettoyage des anciennes images
            docker image prune -f
