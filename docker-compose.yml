# ──────────────────────────────────────────────────────────────
# VOLUMES persistants — les données survivent aux mises à jour
# ──────────────────────────────────────────────────────────────
volumes:
  backend_uploads:   # fichiers médias WhatsApp
  backend_logs:      # logs applicatifs NestJS

# ──────────────────────────────────────────────────────────────
# RÉSEAU interne entre les containers
# ──────────────────────────────────────────────────────────────
networks:
  whatsapp-net:
    driver: bridge

services:

  # ────────────────────────────────
  # BACKEND — NestJS (port 3002)
  # ────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/back:${IMAGE_TAG:-latest}
    container_name: whatsapp-back
    restart: unless-stopped
    env_file: ./message_whatsapp/.env
    ports:
      - "3002:3002"
      - "3005:3005"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    networks:
      - whatsapp-net
    # Accès à MySQL installé directement sur le serveur host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3002/',r=>process.exit(r.statusCode>=500?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────
  # FRONTEND — Next.js agents (port 3000)
  # ────────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/front:${IMAGE_TAG:-latest}
    container_name: whatsapp-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - whatsapp-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode>=500?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ────────────────────────────────
  # ADMIN — Next.js panel (port 3001)
  # ────────────────────────────────
  admin:
    image: ghcr.io/${GITHUB_REPOSITORY}/admin:${IMAGE_TAG:-latest}
    container_name: whatsapp-admin
    restart: unless-stopped
    ports:
      - "3001:3000"
    networks:
      - whatsapp-net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode>=500?1:0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
